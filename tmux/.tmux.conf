# ─── Prefix ───
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ─── General ───
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g escape-time 0
set -g focus-events on

# ─── Terminal ───
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ─── Keybindings ───
bind m set -g mouse
bind e new-window -n '~/.tmux.conf' "sh -c 'vi ~/.tmux.conf && tmux source ~/.tmux.conf'"
bind r source-file ~/.tmux.conf \; display "Reloaded .tmux.conf"

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Prefix + =: evenly redistribute heights within the current pane's column
# (mnemonic: vim's <C-w>= "equalize windows"), leaving the horizontal split
# ratio (e.g. 50|25|25) and every other column untouched.
bind-key = run-shell "~/.local/bin/tmux-rebalance-column #{pane_id}"

# Prefix + |: reset the window's top-level column widths back to 50|25|25
# (mnemonic: | as a column divider), undoing any drag/resize drift. Row
# heights within each column are untouched — pair with prefix + = per column.
bind-key '|' run-shell "~/.local/bin/tmux-set-column-widths -t #{window_id} 50 25 25"

bind -n S-Left previous-window
bind -n S-Right next-window

# Prefix + Enter: 현재 세션 전용 플로팅 스크래치 터미널 팝업.
# 세션 이름으로 popup-<session> 세션을 생성/재접속하므로 세션별로 내용이
# 분리·영속되고, 다시 열면 그대로 이어진다. 최초 생성 시 현재 pane의
# 작업 디렉토리에서 시작한다.
bind -r Enter display-popup -d "#{pane_current_path}" -w 80% -h 75% \
  -E "tmux new-session -A -s 'popup-#{session_name}'"

# ─── Alerts ───
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g bell-action none

# ─── Plugins (TPM) ───
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'craftzdog/tmux-claude-session-manager'

# ─── Resurrect & Continuum ───
set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'

# ─── Claude Session Manager ───
# 여러 Claude Code 세션을 프로젝트별로 띄우고, fzf 팝업 피커로
# 상태(working/waiting/idle)·실시간 미리보기를 보며 오간다.
# 의존성: fzf, jq (둘 다 이미 설치·brewfile 등록됨).
#   prefix + y : 현재 디렉토리에서 Claude 세션 실행/재접속
#   prefix + u : 에이전트 피커 열기 (enter 점프 / ctrl-x 종료)
# 키는 기본값(y/u)을 그대로 쓰므로 아래는 문서용 주석으로만 남긴다.
# set -g @claude_launch_key 'y'
# set -g @claude_list_key   'u'
# set -g @claude_command    'claude'
# set -g @claude_args       ''        # 예: '--dangerously-skip-permissions'
# set -g @claude_session_prefix 'claude-'
# set -g @claude_popup_width  '90%'
# set -g @claude_popup_height '90%'

# ─── Catppuccin Theme ───
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_flags "icon"

# ─── Pane Labels ───
# Status line above each pane, for identifying panes (e.g. Claude agent instances).
# Shows a manually-assigned @label if set, else falls back to the running command.
# (@catppuccin_pane_border_status is unused by this plugin version; pane-border-status
# is the real tmux option that turns the line on.)
set -g pane-border-status top
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_default_text "##{?@label,##{@label},##{pane_current_command}}"

# Prefix + R: assign/rename the current pane's label.
bind-key R command-prompt -p "Pane label:" "set-option -p @label '%%'"

# ─── Status Bar ───
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ─── TPM 초기화 (반드시 맨 마지막) ───
run '~/.config/tmux/plugins/tpm/tpm'
